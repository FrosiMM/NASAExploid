<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Марс — NASA Space Explorer</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="stars-bg"></div>

  <header class="site-header">
    <div class="logo">
      <a href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:10px;">
        <span class="logo-icon">🛸</span>
        <span class="logo-text">NASA<span class="logo-accent">Explorer</span></span>
      </a>
    </div>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Головна</a>
      <a href="mars.html" class="nav-link active">Марс</a>
      <a href="moon.html" class="nav-link">Місяць</a>
      <a href="asteroids.html" class="nav-link">Астероїди</a>
      <a href="team.html" class="nav-link">Учасники</a>
    </nav>
    <div class="nav-date" id="nav-date"></div>
  </header>

  <section class="page-hero page-hero-mars">
    <div class="page-hero-content">
      <span class="page-hero-emoji">🔴</span>
      <h1 class="page-hero-title">Поверхня Марсу</h1>
      <p class="page-hero-sub">Реальні знімки з марсоходів Curiosity та Perseverance</p>
    </div>
    <div class="page-hero-orb mars-orb"></div>
  </section>

  <section class="controls-section">
    <div class="controls-box">
      <div class="control-group">
        <label class="control-label">Марсохід</label>
        <select id="rover-select" class="control-select">
          <option value="curiosity">Curiosity</option>
          <option value="perseverance">Perseverance</option>
          <option value="opportunity">Opportunity</option>
        </select>
      </div>
      <div class="control-group">
        <label class="control-label">Сонячний день (Sol)</label>
        <input type="number" id="sol-input" class="control-input" value="1000" min="1" max="4000" />
      </div>
      <button id="load-photos-btn" class="btn btn-primary">Завантажити фото</button>
    </div>
  </section>

  <section class="gallery-section">
    <div class="gallery-stats" id="gallery-stats"></div>
    <div class="gallery-grid" id="gallery-grid">
      <div class="loader">Натисни кнопку для завантаження фото</div>
    </div>
  </section>

  <div id="lightbox" class="lightbox hidden">
    <div class="lightbox-overlay" id="lightbox-overlay"></div>
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightbox-close">✕</button>
      <img id="lightbox-img" src="" alt="" />
      <div class="lightbox-info" id="lightbox-info"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Дані надані <a href="https://api.nasa.gov" target="_blank">NASA Open APIs</a> · Навчальний проект · 11 клас · Шаповала Т. · Яковчука Н. · Кордана І.</p>
  </footer>

  <script src="stars.js"></script>
  <script src="mars.js"></script>
  <script>
    document.getElementById("nav-date").textContent = new Date().toLocaleDateString("uk-UA", {
      day: "numeric", month: "long", year: "numeric"
    });
  </script>

</body>
</html>
